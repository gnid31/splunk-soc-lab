# Field extractions for Sysmon events (WinEventLog format).
# Applied to sourcetype used by our inputs.
[WinEventLog:Microsoft-Windows-Sysmon/Operational]
EXTRACT-sysmon_commandline = CommandLine:\s+(?<CommandLine>[^\r\n]+)
EXTRACT-sysmon_image = (?:^|\s)Image:\s+(?<Image>[^\r\n]+)
EXTRACT-sysmon_parentimage = ParentImage:\s+(?<ParentImage>[^\r\n]+)
EXTRACT-sysmon_targetimage = TargetImage:\s+(?<TargetImage>[^\r\n]+)
EXTRACT-sysmon_sourceimage = SourceImage:\s+(?<SourceImage>[^\r\n]+)
EXTRACT-sysmon_targetobject = TargetObject:\s+(?<TargetObject>[^\r\n]+)
EXTRACT-sysmon_grantedaccess = GrantedAccess:\s+(?<GrantedAccess>[^\r\n]+)
EXTRACT-sysmon_user = (?:^|\r?\n)User:\s+(?<sysmon_user>[^\r\n]+)
EXTRACT-sysmon_details = Details:\s+(?<Details>[^\r\n]+)
EXTRACT-sysmon_processid = ProcessId:\s+(?<ProcessId>\d+)
EXTRACT-sysmon_sourceprocessid = SourceProcessId:\s+(?<SourceProcessId>\d+)
